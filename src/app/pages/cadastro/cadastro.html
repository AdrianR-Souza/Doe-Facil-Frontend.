<div class="page">
  <header class="header">
    <span routerLink="/">◀</span>
    <h1>Cadastro</h1>
    <span>☰</span>
  </header>

  <div class="content">

    <div class="form-card">
      <h2>Criar conta de doador</h2>

      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" [(ngModel)]="doador.nome" placeholder="Seu nome" />
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select [(ngModel)]="doador.tipo_doador">
          <option value="cpf">CPF (Pessoa Física)</option>
          <option value="cnpj">CNPJ (Empresa)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" [(ngModel)]="doador.telefone" placeholder="(44) 99999-0000" />
      </div>
      <div class="form-group">
        <label>Endereço</label>
        <input type="text" [(ngModel)]="doador.endereco" placeholder="Rua, número" />
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" [(ngModel)]="doador.cidade" placeholder="Cidade" />
      </div>
      <div class="form-group">
        <label>CEP</label>
        <input type="text" [(ngModel)]="doador.cep" placeholder="00.000-000" />
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" [(ngModel)]="doador.email" placeholder="seu@email.com" />
      </div>

      @if (mensagem) {
        <div class="mensagem" [class.sucesso]="sucesso" [class.erro]="!sucesso">{{ mensagem }}</div>
      }

      @if (sucesso) {
        <button class="btn-confirmar" routerLink="/">Voltar ao início</button>
      } @else {
        <button class="btn-confirmar" (click)="cadastrar()">Criar cadastro</button>
      }

    </div>

  </div>
</div>
